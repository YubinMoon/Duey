spring:
  application:
    name: duey-server
  sql:
    init:
      mode: always

duey:
  auth:
    google-client-id: ${GOOGLE_CLIENT_ID:}
    jwt-secret: ${JWT_SECRET:dev-only-secret-change-before-use-dev-only-secret}
    access-token-minutes: ${ACCESS_TOKEN_MINUTES:30}
    refresh-token-days: ${REFRESH_TOKEN_DAYS:30}
  ai:
    provider: ${AI_PROVIDER:gemini}
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-3.1-flash-lite-preview}
