spring:
  datasource:
    driver-class-name: ${DB_DRIVER}
    url: ${DB_URL}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}

duey:
  auth:
    google-client-id: ${GOOGLE_CLIENT_ID}
    jwt-secret: ${JWT_SECRET}
  ai:
    provider: ${AI_PROVIDER:gemini}
    gemini-api-key: ${GEMINI_API_KEY}
